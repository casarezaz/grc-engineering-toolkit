<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Readiness Scorecard | GRC Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#141414;color:#e5e5e5;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:24px 32px;border-bottom:3px solid #e50914}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:#999;font-size:14px;margin-top:4px}
.content{padding:24px 32px}
.score-hero{display:flex;align-items:center;gap:40px;background:#1e1e1e;border-radius:12px;padding:32px;margin-bottom:24px}
.score-ring{position:relative;width:180px;height:180px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-big{font-size:48px;font-weight:700}
.score-label{font-size:12px;color:#888;text-transform:uppercase}
.score-details{flex:1}
.score-details h2{font-size:22px;color:#fff;margin-bottom:8px}
.score-details p{color:#999;font-size:14px;line-height:1.6}
.readiness-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:24px}
.card{background:#1e1e1e;border-radius:10px;padding:24px}
.card h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.audit-item{border-bottom:1px solid #2a2a2a;padding:14px 0}
.audit-item:last-child{border-bottom:none}
.audit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.audit-name{font-size:14px;font-weight:600;color:#e5e5e5}
.audit-score{font-size:14px;font-weight:700}
.audit-bar{height:8px;background:#2a2a2a;border-radius:4px;overflow:hidden}
.audit-fill{height:100%;border-radius:4px;transition:width .6s}
.audit-details{display:flex;gap:16px;margin-top:8px;font-size:11px;color:#888}
.checklist{list-style:none}
.checklist li{padding:10px 0;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:10px;font-size:13px}
.checklist li:last-child{border-bottom:none}
.check{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.check-pass{background:#1a3a2a;color:#2ecc71}
.check-fail{background:#3a1a1a;color:#e74c3c}
.check-warn{background:#3a2e1a;color:#f39c12}
.timeline-card{background:#1e1e1e;border-radius:10px;padding:24px;margin-bottom:24px}
.audit-timeline{display:flex;justify-content:space-between;position:relative;padding:20px 0}
.audit-timeline::before{content:'';position:absolute;top:30px;left:5%;right:5%;height:3px;background:#2a2a2a}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;flex:1}
.tl-dot{width:20px;height:20px;border-radius:50%;border:3px solid #2a2a2a}
.tl-dot.done{background:#2ecc71;border-color:#2ecc71}
.tl-dot.active{background:#f39c12;border-color:#f39c12;box-shadow:0 0 12px rgba(243,156,18,.4)}
.tl-dot.pending{background:#2a2a2a}
.tl-label{font-size:11px;color:#888;text-align:center;max-width:80px}
.tl-date{font-size:10px;color:#555}
.gap-table{width:100%;border-collapse:collapse}
.gap-table th{background:#252525;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
.gap-table td{padding:10px 14px;border-bottom:1px solid #2a2a2a;font-size:13px}
.priority{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.p-critical{background:#3a1a1a;color:#e74c3c}
.p-high{background:#3a2e1a;color:#e67e22}
.p-medium{background:#3a3a1a;color:#f39c12}
.p-low{background:#1a3a2a;color:#2ecc71}
@media(max-width:768px){.score-hero{flex-direction:column;text-align:center}.grid{grid-template-columns:1fr}.audit-timeline{flex-wrap:wrap;gap:16px}}
</style>
</head>
<body>
<div class="header">
<h1>Audit Readiness Scorecard</h1>
<p>Enterprise GRC — Pre-Audit Assessment & Gap Tracking</p>
</div>
<div class="content">

<div class="score-hero">
<div class="score-ring">
<svg width="180" height="180" viewBox="0 0 180 180">
<circle cx="90" cy="90" r="80" fill="none" stroke="#2a2a2a" stroke-width="12"/>
<circle id="scoreArc" cx="90" cy="90" r="80" fill="none" stroke="#2ecc71" stroke-width="12" stroke-dasharray="0 503" stroke-linecap="round"/>
</svg>
<div class="score-center"><div class="score-big" id="overallScore">0</div><div class="score-label">Overall</div></div>
</div>
<div class="score-details">
<h2 id="readinessTitle">Calculating...</h2>
<p id="readinessDesc"></p>
<div id="readinessBadge"></div>
</div>
</div>

<div class="timeline-card">
<h3 style="font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Audit Timeline — SOX Annual Cycle</h3>
<div class="audit-timeline" id="auditTimeline"></div>
</div>

<div class="grid" id="auditCards"></div>

<div class="card" style="margin-bottom:24px">
<h3>Pre-Audit Checklist</h3>
<ul class="checklist" id="checklist"></ul>
</div>

<div class="card">
<h3>Open Gaps & Remediation Tracker</h3>
<table class="gap-table">
<thead><tr><th>Gap ID</th><th>Description</th><th>Framework</th><th>Priority</th><th>Owner</th><th>Target Date</th><th>Status</th></tr></thead>
<tbody id="gapTable"></tbody>
</table>
</div>
</div>

<script>
const audits=[
  {name:"SOX (ITGC)",score:92,evidence:95,controls:90,testing:88,docs:96,lastAudit:"2025-11-15",nextAudit:"2026-05-15",auditor:"Wolf & Company"},
  {name:"PCI-DSS v4.0",score:88,evidence:90,controls:85,testing:82,docs:92,lastAudit:"2025-09-20",nextAudit:"2026-09-20",auditor:"External QSA"},
  {name:"ISO 27001",score:85,evidence:88,controls:82,testing:80,docs:90,lastAudit:"2025-06-10",nextAudit:"2026-06-10",auditor:"BSI"},
  {name:"GDPR",score:80,evidence:82,controls:78,testing:75,docs:85,lastAudit:"2025-08-01",nextAudit:"2026-08-01",auditor:"DPA Review"},
  {name:"CMMC Level 2",score:72,evidence:75,controls:70,testing:65,docs:78,lastAudit:"N/A",nextAudit:"2026-Q3",auditor:"C3PAO (TBD)"},
  {name:"FedRAMP",score:68,evidence:70,controls:65,testing:62,docs:75,lastAudit:"N/A",nextAudit:"2026-Q4",auditor:"3PAO (TBD)"},
];

const timeline=[
  {label:"Scoping",date:"Jan 2026",status:"done"},
  {label:"Walkthrough",date:"Feb 2026",status:"done"},
  {label:"Evidence Collection",date:"Mar 2026",status:"active"},
  {label:"Testing",date:"Apr 2026",status:"pending"},
  {label:"Remediation",date:"May 2026",status:"pending"},
  {label:"Final Report",date:"Jun 2026",status:"pending"},
];

const checklistItems=[
  {text:"All control owners identified and documented",status:"pass"},
  {text:"Evidence repository organized by control domain",status:"pass"},
  {text:"Access reviews completed for current quarter",status:"pass"},
  {text:"Vulnerability scan reports current (< 30 days)",status:"pass"},
  {text:"Change management logs exported and reviewed",status:"pass"},
  {text:"DR/BC test results documented with findings",status:"pass"},
  {text:"Risk register updated with current assessments",status:"warn"},
  {text:"Vendor assessments completed for Tier 1 vendors",status:"pass"},
  {text:"Policy documents reviewed and signed off",status:"pass"},
  {text:"SOC 2 reports collected from critical vendors",status:"warn"},
  {text:"Incident response tabletop exercise completed",status:"pass"},
  {text:"Data classification inventory current",status:"fail"},
  {text:"Encryption key management audit completed",status:"pass"},
  {text:"Privileged access management logs reviewed",status:"pass"},
  {text:"CMMC gap remediation plan finalized",status:"fail"},
];

const gaps=[
  {id:"GAP-001",desc:"Data classification inventory incomplete for EU data stores",fw:"GDPR",priority:"Critical",owner:"Privacy Team",target:"2026-04-15",status:"In Progress"},
  {id:"GAP-002",desc:"CMMC Level 2 practice PE.L2-3.10.1 — visitor access logs",fw:"CMMC",priority:"High",owner:"Facilities",target:"2026-05-01",status:"Open"},
  {id:"GAP-003",desc:"FedRAMP continuous monitoring — automated scanning gap",fw:"FedRAMP",priority:"High",owner:"Security Engineering",target:"2026-06-01",status:"In Progress"},
  {id:"GAP-004",desc:"SOC 2 reports missing for 2 Tier 1 vendors",fw:"ISO 27001",priority:"Medium",owner:"Third-Party Risk",target:"2026-04-30",status:"Open"},
  {id:"GAP-005",desc:"CMMC assessment boundary documentation",fw:"CMMC",priority:"High",owner:"GRC Team",target:"2026-05-15",status:"Open"},
  {id:"GAP-006",desc:"Audit log retention < 12 months for legacy systems",fw:"SOX",priority:"Medium",owner:"Platform Engineering",target:"2026-06-30",status:"In Progress"},
];

// Overall score
const overall=Math.round(audits.reduce((s,a)=>s+a.score,0)/audits.length);
const circ=2*Math.PI*80;
const scoreColor=overall>=85?'#2ecc71':overall>=70?'#f39c12':'#e74c3c';
document.getElementById('scoreArc').setAttribute('stroke-dasharray',`${(overall/100)*circ} ${circ}`);
document.getElementById('scoreArc').setAttribute('stroke',scoreColor);
document.getElementById('overallScore').textContent=overall;
document.getElementById('overallScore').style.color=scoreColor;

const readinessLevel=overall>=85?'Audit Ready':overall>=70?'Partially Ready':'Not Ready';
const readinessColor=overall>=85?'#2ecc71':overall>=70?'#f39c12':'#e74c3c';
document.getElementById('readinessTitle').textContent=`${readinessLevel} — ${overall}% Overall Readiness`;
document.getElementById('readinessDesc').textContent=`Across ${audits.length} regulatory frameworks, ${audits.filter(a=>a.score>=85).length} are audit-ready, ${audits.filter(a=>a.score>=70&&a.score<85).length} are partially ready, and ${audits.filter(a=>a.score<70).length} have significant gaps requiring remediation before examination.`;
document.getElementById('readinessBadge').innerHTML=`<span class="readiness-badge" style="background:${readinessColor}22;color:${readinessColor}">${readinessLevel}</span>`;

// Timeline
document.getElementById('auditTimeline').innerHTML=timeline.map(t=>`
  <div class="tl-node">
    <div class="tl-dot ${t.status}"></div>
    <div class="tl-label">${t.label}</div>
    <div class="tl-date">${t.date}</div>
  </div>
`).join('');

// Audit cards
document.getElementById('auditCards').innerHTML=audits.map(a=>{
  const color=a.score>=85?'#2ecc71':a.score>=70?'#f39c12':'#e74c3c';
  const dims=[{label:'Evidence',val:a.evidence},{label:'Controls',val:a.controls},{label:'Testing',val:a.testing},{label:'Documentation',val:a.docs}];
  return `<div class="card">
    <div class="audit-item" style="border:none;padding:0">
      <div class="audit-top">
        <span class="audit-name">${a.name}</span>
        <span class="audit-score" style="color:${color}">${a.score}%</span>
      </div>
      <div class="audit-bar"><div class="audit-fill" style="width:${a.score}%;background:${color}"></div></div>
      <div class="audit-details">
        <span>Auditor: ${a.auditor}</span>
        <span>Next: ${a.nextAudit}</span>
      </div>
    </div>
    ${dims.map(d=>{
      const dc=d.val>=85?'#2ecc71':d.val>=70?'#f39c12':'#e74c3c';
      return `<div style="display:flex;align-items:center;gap:10px;margin-top:10px">
        <span style="width:100px;font-size:12px;color:#888">${d.label}</span>
        <div style="flex:1;height:6px;background:#2a2a2a;border-radius:3px"><div style="width:${d.val}%;height:100%;background:${dc};border-radius:3px"></div></div>
        <span style="font-size:12px;font-weight:600;color:${dc};min-width:35px;text-align:right">${d.val}%</span>
      </div>`;
    }).join('')}
  </div>`;
}).join('');

// Checklist
document.getElementById('checklist').innerHTML=checklistItems.map(c=>{
  const icon=c.status==='pass'?'✓':c.status==='warn'?'!':'✗';
  const cls=c.status==='pass'?'check-pass':c.status==='warn'?'check-warn':'check-fail';
  return `<li><div class="check ${cls}">${icon}</div>${c.text}</li>`;
}).join('');

// Gap table
const pClasses={Critical:'p-critical',High:'p-high',Medium:'p-medium',Low:'p-low'};
document.getElementById('gapTable').innerHTML=gaps.map(g=>`
  <tr><td><strong>${g.id}</strong></td><td>${g.desc}</td><td>${g.fw}</td>
  <td><span class="priority ${pClasses[g.priority]}">${g.priority}</span></td>
  <td>${g.owner}</td><td>${g.target}</td>
  <td><span style="color:${g.status==='In Progress'?'#f39c12':'#e74c3c'}">${g.status}</span></td></tr>
`).join('');
</script>
</body>
</html>
