<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DR/BC Asset Criticality Ranker | GRC Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#141414;color:#e5e5e5;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:24px 32px;border-bottom:3px solid #e50914}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:#999;font-size:14px;margin-top:4px}
.content{padding:24px 32px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#1e1e1e;border-radius:10px;padding:18px;text-align:center}
.stat-num{font-size:32px;font-weight:700}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.card{background:#1e1e1e;border-radius:10px;padding:24px}
.card h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{background:#252525;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;position:sticky;top:0;cursor:pointer}
th:hover{color:#e50914}
td{padding:10px 14px;border-bottom:1px solid #2a2a2a;font-size:13px}
tr:hover{background:#252525}
.tier{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700}
.tier-1{background:#3a1a1a;color:#e74c3c}
.tier-2{background:#3a2e1a;color:#e67e22}
.tier-3{background:#3a3a1a;color:#f39c12}
.tier-4{background:#1a3a2a;color:#2ecc71}
.btn{background:#e50914;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:#b2070f}
.btn-outline{background:transparent;border:1px solid #e50914;color:#e50914}
.btn-sm{padding:5px 12px;font-size:12px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
select,input{background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 14px;border-radius:6px;font-size:13px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#1e1e1e;border-radius:12px;padding:28px;width:90%;max-width:600px;border:1px solid #333;max-height:90vh;overflow-y:auto}
.modal h3{font-size:20px;margin-bottom:16px;color:#fff}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 12px;border-radius:6px;font-size:13px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.tier-dist{display:flex;gap:4px;height:30px;border-radius:6px;overflow:hidden;margin-top:8px}
.tier-segment{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:width .5s}
.rto-visual{display:flex;align-items:center;gap:6px}
.rto-bar{height:8px;border-radius:4px;transition:width .5s}
.recovery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}
.recovery-card{text-align:center;padding:12px;background:#252525;border-radius:8px}
.recovery-card .val{font-size:24px;font-weight:700;color:#fff}
.recovery-card .lbl{font-size:10px;color:#888;text-transform:uppercase;margin-top:4px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<h1>DR/BC Asset Criticality Ranker</h1>
<p>Enterprise GRC — Business Impact Analysis & Recovery Prioritization</p>
</div>
<div class="content">
<div class="stats" id="statsRow"></div>
<div class="toolbar">
<select id="tierFilter"><option value="all">All Tiers</option><option value="1">Tier 1 — Critical</option><option value="2">Tier 2 — High</option><option value="3">Tier 3 — Medium</option><option value="4">Tier 4 — Low</option></select>
<select id="catFilter"><option value="all">All Categories</option></select>
<input type="text" id="search" placeholder="Search assets..." style="width:200px">
<button class="btn" onclick="openAdd()">+ Add Asset</button>
<button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
</div>
<div class="grid">
<div class="card">
<h3>Asset Inventory & Criticality</h3>
<table>
<thead><tr>
<th onclick="sortBy('name')">Asset</th>
<th onclick="sortBy('category')">Category</th>
<th onclick="sortBy('tier')">Tier</th>
<th onclick="sortBy('rto')">RTO</th>
<th onclick="sortBy('rpo')">RPO</th>
<th onclick="sortBy('score')">BIA Score</th>
<th>DR Tested</th>
</tr></thead>
<tbody id="assetTable"></tbody>
</table>
</div>
<div>
<div class="card" style="margin-bottom:20px">
<h3>Tier Distribution</h3>
<div class="tier-dist" id="tierDist"></div>
<div id="tierLegend" style="margin-top:12px"></div>
</div>
<div class="card" style="margin-bottom:20px">
<h3>Recovery Targets Summary</h3>
<div class="recovery-grid" id="recoveryGrid"></div>
</div>
<div class="card">
<h3>Assets Without DR Test</h3>
<div id="untestedList"></div>
</div>
</div>
</div>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<h3>Add / Edit Asset</h3>
<div class="fg"><label>Asset Name</label><input id="fName"></div>
<div class="fg"><label>Category</label>
<select id="fCat"><option>Application</option><option>Infrastructure</option><option>Data Store</option><option>Network</option><option>Third-Party Service</option><option>Facility</option></select></div>
<div class="fg"><label>Business Function</label><input id="fFunc" placeholder="e.g. Payment Processing, Content Delivery"></div>
<div class="fg"><label>Revenue Impact (1-5)</label><select id="fRev"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>Operational Impact (1-5)</label><select id="fOps"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>Regulatory Impact (1-5)</label><select id="fReg"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>Reputational Impact (1-5)</label><select id="fRep"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>RTO (Recovery Time Objective)</label>
<select id="fRTO"><option>15 min</option><option>1 hr</option><option>4 hr</option><option>8 hr</option><option>24 hr</option><option>72 hr</option><option>1 week</option></select></div>
<div class="fg"><label>RPO (Recovery Point Objective)</label>
<select id="fRPO"><option>0 (zero data loss)</option><option>15 min</option><option>1 hr</option><option>4 hr</option><option>24 hr</option><option>72 hr</option></select></div>
<div class="fg"><label>DR Tested</label><select id="fTested"><option value="true">Yes</option><option value="false">No</option></select></div>
<div class="fg"><label>Last DR Test Date</label><input id="fTestDate" type="date"></div>
<div class="modal-actions">
<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="saveAsset()">Save</button>
</div>
</div>
</div>

<script>
const sampleAssets=[
{name:"Streaming Platform (Core)",cat:"Application",func:"Content Delivery",rev:5,ops:5,reg:4,rep:5,rto:"15 min",rpo:"0 (zero data loss)",tested:true,testDate:"2026-01-15"},
{name:"Payment Gateway",cat:"Application",func:"Billing & Payments",rev:5,ops:5,reg:5,rep:5,rto:"15 min",rpo:"0 (zero data loss)",tested:true,testDate:"2026-01-15"},
{name:"Member Authentication (IAM)",cat:"Application",func:"User Access",rev:5,ops:5,reg:4,rep:4,rto:"15 min",rpo:"15 min",tested:true,testDate:"2026-02-01"},
{name:"Content Delivery Network",cat:"Infrastructure",func:"Content Delivery",rev:5,ops:5,reg:3,rep:5,rto:"15 min",rpo:"1 hr",tested:true,testDate:"2026-01-20"},
{name:"Member Database (Primary)",cat:"Data Store",func:"User Data",rev:5,ops:5,reg:5,rep:4,rto:"1 hr",rpo:"0 (zero data loss)",tested:true,testDate:"2026-01-15"},
{name:"Content Metadata DB",cat:"Data Store",func:"Content Catalog",rev:4,ops:4,reg:3,rep:3,rto:"4 hr",rpo:"1 hr",tested:true,testDate:"2025-11-10"},
{name:"Recommendation Engine",cat:"Application",func:"Personalization",rev:4,ops:3,reg:2,rep:4,rto:"4 hr",rpo:"4 hr",tested:false,testDate:""},
{name:"SOX Reporting System",cat:"Application",func:"Financial Compliance",rev:3,ops:4,reg:5,rep:3,rto:"8 hr",rpo:"4 hr",tested:true,testDate:"2026-02-15"},
{name:"SIEM (Splunk)",cat:"Infrastructure",func:"Security Monitoring",rev:2,ops:4,reg:4,rep:3,rto:"4 hr",rpo:"1 hr",tested:true,testDate:"2025-12-01"},
{name:"GRC Platform",cat:"Application",func:"Governance & Compliance",rev:2,ops:3,reg:4,rep:2,rto:"24 hr",rpo:"4 hr",tested:false,testDate:""},
{name:"Corporate Email",cat:"Third-Party Service",func:"Communications",rev:2,ops:3,reg:2,rep:2,rto:"4 hr",rpo:"1 hr",tested:false,testDate:""},
{name:"VPN / Remote Access",cat:"Network",func:"Employee Access",rev:2,ops:3,reg:2,rep:2,rto:"4 hr",rpo:"24 hr",tested:true,testDate:"2026-01-05"},
{name:"Data Warehouse",cat:"Data Store",func:"Analytics",rev:3,ops:2,reg:2,rep:2,rto:"24 hr",rpo:"24 hr",tested:false,testDate:""},
{name:"Internal Wiki / Docs",cat:"Application",func:"Knowledge Mgmt",rev:1,ops:2,reg:1,rep:1,rto:"72 hr",rpo:"24 hr",tested:false,testDate:""},
{name:"Dev/Test Environments",cat:"Infrastructure",func:"Engineering",rev:1,ops:2,reg:1,rep:1,rto:"1 week",rpo:"72 hr",tested:false,testDate:""},
];

let assets=JSON.parse(localStorage.getItem('drbc_assets'))||sampleAssets;
let editIdx=-1;
let sortField='score';let sortDir=-1;
function save(){localStorage.setItem('drbc_assets',JSON.stringify(assets))}

function calcScore(a){return a.rev+a.ops+a.reg+a.rep}
function calcTier(score){return score>=17?1:score>=13?2:score>=8?3:4}

function render(){
  const tf=document.getElementById('tierFilter').value;
  const cf=document.getElementById('catFilter').value;
  const q=document.getElementById('search').value.toLowerCase();

  let list=assets.map(a=>({...a,score:calcScore(a),tier:calcTier(calcScore(a))}));
  if(tf!=='all')list=list.filter(a=>a.tier===+tf);
  if(cf!=='all')list=list.filter(a=>a.cat===cf);
  if(q)list=list.filter(a=>a.name.toLowerCase().includes(q)||a.func.toLowerCase().includes(q));

  list.sort((a,b)=>{
    const av=a[sortField],bv=b[sortField];
    if(typeof av==='number')return (av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });

  // Stats
  const all=assets.map(a=>({...a,score:calcScore(a),tier:calcTier(calcScore(a))}));
  const t1=all.filter(a=>a.tier===1).length;
  const tested=all.filter(a=>a.tested).length;
  const untested=all.filter(a=>!a.tested&&a.tier<=2).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-num" style="color:#3498db">${all.length}</div><div class="stat-label">Total Assets</div></div>
    <div class="stat"><div class="stat-num" style="color:#e74c3c">${t1}</div><div class="stat-label">Tier 1 Critical</div></div>
    <div class="stat"><div class="stat-num" style="color:#2ecc71">${tested}</div><div class="stat-label">DR Tested</div></div>
    <div class="stat"><div class="stat-num" style="color:#f39c12">${untested}</div><div class="stat-label">Untested (Tier 1-2)</div></div>
    <div class="stat"><div class="stat-num" style="color:#fff">${Math.round((tested/all.length)*100)}%</div><div class="stat-label">Test Coverage</div></div>
  `;

  // Table
  const tierColors={1:['tier-1','Tier 1 — Critical'],2:['tier-2','Tier 2 — High'],3:['tier-3','Tier 3 — Medium'],4:['tier-4','Tier 4 — Low']};
  document.getElementById('assetTable').innerHTML=list.map((a,i)=>{
    const oi=assets.findIndex(o=>o.name===a.name);
    const [tc,tl]=tierColors[a.tier];
    return `<tr onclick="openEdit(${oi})" style="cursor:pointer">
      <td><strong>${a.name}</strong><br><span style="font-size:11px;color:#666">${a.func}</span></td>
      <td>${a.cat}</td>
      <td><span class="tier ${tc}">${tl}</span></td>
      <td>${a.rto}</td><td>${a.rpo}</td>
      <td><strong style="color:${a.score>=17?'#e74c3c':a.score>=13?'#e67e22':a.score>=8?'#f39c12':'#2ecc71'}">${a.score}/20</strong></td>
      <td>${a.tested?`<span style="color:#2ecc71">✓</span> <span style="font-size:11px;color:#666">${a.testDate}</span>`:'<span style="color:#e74c3c">✗</span>'}</td>
    </tr>`;
  }).join('');

  // Tier distribution
  const tierCounts={1:0,2:0,3:0,4:0};
  all.forEach(a=>tierCounts[a.tier]++);
  const total=all.length;
  const tColors={1:'#e74c3c',2:'#e67e22',3:'#f39c12',4:'#2ecc71'};
  document.getElementById('tierDist').innerHTML=Object.entries(tierCounts).map(([t,c])=>
    `<div class="tier-segment" style="width:${(c/total)*100}%;background:${tColors[t]};color:#fff">${c}</div>`
  ).join('');
  document.getElementById('tierLegend').innerHTML=Object.entries(tierCounts).map(([t,c])=>
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:${tColors[t]}"></div>${tierColors[t][1]}: ${c} assets (${Math.round((c/total)*100)}%)</div>`
  ).join('');

  // Recovery grid
  const tier1Assets=all.filter(a=>a.tier===1);
  document.getElementById('recoveryGrid').innerHTML=`
    <div class="recovery-card"><div class="val" style="color:#e74c3c">${tier1Assets.length}</div><div class="lbl">Tier 1 Assets</div></div>
    <div class="recovery-card"><div class="val" style="color:#f39c12">${tier1Assets.filter(a=>a.rto==='15 min').length}</div><div class="lbl">RTO ≤ 15min</div></div>
    <div class="recovery-card"><div class="val" style="color:#2ecc71">${tier1Assets.filter(a=>a.tested).length}/${tier1Assets.length}</div><div class="lbl">T1 Tested</div></div>
    <div class="recovery-card"><div class="val" style="color:#3498db">${tier1Assets.filter(a=>a.rpo.includes('zero')).length}</div><div class="lbl">Zero Data Loss</div></div>
  `;

  // Untested
  const untestedAssets=all.filter(a=>!a.tested).sort((a,b)=>b.score-a.score);
  document.getElementById('untestedList').innerHTML=untestedAssets.length?untestedAssets.map(a=>{
    const [tc]=tierColors[a.tier];
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2a">
      <div><span style="font-size:13px">${a.name}</span><br><span style="font-size:11px;color:#666">${a.cat}</span></div>
      <span class="tier ${tc}" style="font-size:10px">${a.score}/20</span>
    </div>`;
  }).join(''):'<div style="color:#2ecc71;font-size:13px">All assets have been DR tested ✓</div>';

  // Categories filter
  const cats=[...new Set(assets.map(a=>a.cat))];
  const catSel=document.getElementById('catFilter');
  const curCat=catSel.value;
  catSel.innerHTML='<option value="all">All Categories</option>'+cats.map(c=>`<option ${c===curCat?'selected':''}>${c}</option>`).join('');
}

function sortBy(field){if(sortField===field)sortDir*=-1;else{sortField=field;sortDir=-1}render()}
function openAdd(){editIdx=-1;['fName','fFunc','fTestDate'].forEach(id=>document.getElementById(id).value='');['fRev','fOps','fReg','fRep'].forEach(id=>document.getElementById(id).value='3');document.getElementById('fCat').value='Application';document.getElementById('fRTO').value='4 hr';document.getElementById('fRPO').value='1 hr';document.getElementById('fTested').value='false';document.getElementById('modal').classList.add('active')}
function openEdit(i){editIdx=i;const a=assets[i];document.getElementById('fName').value=a.name;document.getElementById('fCat').value=a.cat;document.getElementById('fFunc').value=a.func;document.getElementById('fRev').value=a.rev;document.getElementById('fOps').value=a.ops;document.getElementById('fReg').value=a.reg;document.getElementById('fRep').value=a.rep;document.getElementById('fRTO').value=a.rto;document.getElementById('fRPO').value=a.rpo;document.getElementById('fTested').value=a.tested?'true':'false';document.getElementById('fTestDate').value=a.testDate;document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function saveAsset(){
  const a={name:document.getElementById('fName').value,cat:document.getElementById('fCat').value,func:document.getElementById('fFunc').value,rev:+document.getElementById('fRev').value,ops:+document.getElementById('fOps').value,reg:+document.getElementById('fReg').value,rep:+document.getElementById('fRep').value,rto:document.getElementById('fRTO').value,rpo:document.getElementById('fRPO').value,tested:document.getElementById('fTested').value==='true',testDate:document.getElementById('fTestDate').value};
  if(editIdx>=0)assets[editIdx]=a;else assets.push(a);
  save();closeModal();render();
}
function exportCSV(){
  const h='Asset,Category,Function,Revenue,Operational,Regulatory,Reputational,BIA Score,Tier,RTO,RPO,DR Tested,Last Test\n';
  const rows=assets.map(a=>{const s=calcScore(a);return `"${a.name}","${a.cat}","${a.func}",${a.rev},${a.ops},${a.reg},${a.rep},${s},${calcTier(s)},"${a.rto}","${a.rpo}",${a.tested?"Yes":"No"},"${a.testDate}"`}).join('\n');
  const blob=new Blob([h+rows],{type:'text/csv'});const el=document.createElement('a');el.href=URL.createObjectURL(blob);el.download='drbc_asset_criticality.csv';el.click();
}

document.querySelectorAll('#tierFilter,#catFilter').forEach(el=>el.addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);
render();
</script>
</body>
</html>
