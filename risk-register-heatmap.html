<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Register & Heat Map | GRC Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#141414;color:#e5e5e5;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:24px 32px;border-bottom:3px solid #e50914}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:#999;font-size:14px;margin-top:4px}
.content{padding:24px 32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#1e1e1e;border-radius:10px;padding:24px}
.card h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.heatmap{display:grid;grid-template-columns:auto repeat(5,1fr);gap:2px;margin-top:12px}
.hm-cell{width:100%;aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.hm-cell:hover{transform:scale(1.08);box-shadow:0 0 12px rgba(255,255,255,.15);z-index:2}
.hm-label{display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:12px;color:#888;font-weight:600}
.hm-header{display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:11px;color:#888;font-weight:600}
.hm-corner{display:flex;align-items:flex-end;justify-content:flex-end;padding:0 8px 6px 0;font-size:10px;color:#666}
.axis-label{text-align:center;font-size:12px;color:#666;margin-top:8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#1e1e1e;border-radius:10px;padding:16px;text-align:center}
.stat-num{font-size:32px;font-weight:700}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.risk-table{width:100%;border-collapse:collapse;margin-top:12px}
.risk-table th{background:#252525;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
.risk-table td{padding:10px 14px;border-bottom:1px solid #2a2a2a;font-size:13px}
.risk-table tr:hover{background:#252525}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn{background:#e50914;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:#b2070f}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:transparent;border:1px solid #e50914;color:#e50914}
select,input{background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 14px;border-radius:6px;font-size:13px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#1e1e1e;border-radius:12px;padding:28px;width:90%;max-width:550px;border:1px solid #333}
.modal h3{font-size:20px;margin-bottom:16px;color:#fff}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 12px;border-radius:6px;font-size:13px}
.fg textarea{height:60px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.trend-up{color:#e74c3c}
.trend-down{color:#2ecc71}
.trend-flat{color:#f39c12}
.tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;pointer-events:none;display:none;z-index:10}
.hm-cell:hover .tooltip{display:block}
@media(max-width:900px){.grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<h1>Risk Register & Heat Map</h1>
<p>Enterprise GRC — Risk Identification, Assessment & Tracking</p>
</div>

<div class="content">
<div class="stats-row" id="statsRow"></div>

<div class="toolbar">
<select id="catFilter"><option value="all">All Categories</option></select>
<select id="statusFilter"><option value="all">All Statuses</option><option value="Open">Open</option><option value="Mitigating">Mitigating</option><option value="Accepted">Accepted</option><option value="Closed">Closed</option></select>
<input type="text" id="search" placeholder="Search risks..." style="width:200px">
<button class="btn" onclick="openAdd()">+ Add Risk</button>
<button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
</div>

<div class="grid">
<div class="card">
<h3>Risk Heat Map (Likelihood × Impact)</h3>
<div class="heatmap" id="heatmap"></div>
<div class="axis-label">Impact →</div>
</div>
<div class="card">
<h3>Top Risks by Residual Score</h3>
<div id="topRisks"></div>
</div>
</div>

<div class="card" style="margin-top:20px">
<h3>Risk Register</h3>
<table class="risk-table">
<thead><tr><th>ID</th><th>Risk</th><th>Category</th><th>Likelihood</th><th>Impact</th><th>Score</th><th>Status</th><th>Owner</th><th>Trend</th></tr></thead>
<tbody id="riskTable"></tbody>
</table>
</div>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<h3 id="modalTitle">Add Risk</h3>
<div class="fg"><label>Risk ID</label><input id="fId"></div>
<div class="fg"><label>Risk Description</label><input id="fName"></div>
<div class="fg"><label>Category</label>
<select id="fCat"><option>Operational</option><option>Compliance</option><option>Technical</option><option>Strategic</option><option>Financial</option><option>Third-Party</option></select></div>
<div class="fg"><label>Likelihood (1-5)</label><select id="fLik"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>Impact (1-5)</label><select id="fImp"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
<div class="fg"><label>Status</label><select id="fStatus"><option>Open</option><option>Mitigating</option><option>Accepted</option><option>Closed</option></select></div>
<div class="fg"><label>Owner</label><input id="fOwner"></div>
<div class="fg"><label>Mitigation Plan</label><textarea id="fMit"></textarea></div>
<div class="modal-actions">
<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="saveRisk()">Save</button>
</div>
</div>
</div>

<script>
const sampleRisks=[
{id:"R-001",name:"Inadequate SOX control testing coverage",cat:"Compliance",lik:3,imp:5,status:"Mitigating",owner:"GRC Team",trend:"down",mit:"Expanding automated control testing; Q2 target for full coverage"},
{id:"R-002",name:"Cloud misconfiguration exposure",cat:"Technical",lik:4,imp:4,status:"Open",owner:"Cloud Engineering",trend:"flat",mit:"Implementing CSPM tooling"},
{id:"R-003",name:"Third-party vendor data breach",cat:"Third-Party",lik:3,imp:5,status:"Mitigating",owner:"Third-Party Risk",trend:"down",mit:"Enhanced vendor assessment program with continuous monitoring"},
{id:"R-004",name:"Incomplete GDPR data mapping",cat:"Compliance",lik:3,imp:4,status:"Open",owner:"Privacy Team",trend:"up",mit:"Data discovery tool deployment in progress"},
{id:"R-005",name:"Business continuity plan gaps",cat:"Operational",lik:2,imp:5,status:"Mitigating",owner:"Business Continuity",trend:"down",mit:"Annual DR/BC test completed; gap remediation underway"},
{id:"R-006",name:"Insufficient detection coverage",cat:"Technical",lik:3,imp:4,status:"Mitigating",owner:"Detection Engineering",trend:"down",mit:"40+ new detection rules deployed; expanding cloud coverage"},
{id:"R-007",name:"Regulatory change — EU AI Act",cat:"Compliance",lik:4,imp:3,status:"Open",owner:"GRC Team",trend:"up",mit:"COSAIS participation; impact assessment planned Q2"},
{id:"R-008",name:"Privileged access abuse",cat:"Operational",lik:2,imp:5,status:"Mitigating",owner:"IAM Team",trend:"flat",mit:"PAM solution deployed; quarterly access reviews"},
{id:"R-009",name:"Supply chain software compromise",cat:"Third-Party",lik:3,imp:5,status:"Open",owner:"AppSec",trend:"up",mit:"SBOM program in early stages"},
{id:"R-010",name:"PCI-DSS scope creep",cat:"Compliance",lik:2,imp:4,status:"Accepted",owner:"GRC Team",trend:"flat",mit:"Quarterly scope validation; network segmentation verified"},
{id:"R-011",name:"Encryption key management weakness",cat:"Technical",lik:2,imp:4,status:"Mitigating",owner:"Platform Engineering",trend:"down",mit:"HSM migration 80% complete"},
{id:"R-012",name:"Insider threat — data exfiltration",cat:"Operational",lik:2,imp:4,status:"Mitigating",owner:"Security Operations",trend:"flat",mit:"DLP policies active; Darktrace tuned for anomaly detection"},
];

let risks=JSON.parse(localStorage.getItem('risk_register'))||sampleRisks;
let editIdx=-1;
function save(){localStorage.setItem('risk_register',JSON.stringify(risks))}

const hmColors=[
["#1a3a2a","#1a3a2a","#2d4a1a","#3a3a1a","#3a2e1a"],
["#1a3a2a","#2d4a1a","#3a3a1a","#3a2e1a","#3a1a1a"],
["#2d4a1a","#3a3a1a","#3a2e1a","#3a1a1a","#3a1a1a"],
["#3a3a1a","#3a2e1a","#3a1a1a","#3a1a1a","#4a0a0a"],
["#3a2e1a","#3a1a1a","#3a1a1a","#4a0a0a","#5a0000"]
];
const hmTextColors=[
["#2ecc71","#2ecc71","#8bc34a","#f39c12","#e67e22"],
["#2ecc71","#8bc34a","#f39c12","#e67e22","#e74c3c"],
["#8bc34a","#f39c12","#e67e22","#e74c3c","#e74c3c"],
["#f39c12","#e67e22","#e74c3c","#e74c3c","#ff1744"],
["#e67e22","#e74c3c","#e74c3c","#ff1744","#ff1744"]
];

function render(){
  const catF=document.getElementById('catFilter').value;
  const stF=document.getElementById('statusFilter').value;
  const q=document.getElementById('search').value.toLowerCase();

  const filtered=risks.filter(r=>{
    if(catF!=='all'&&r.cat!==catF)return false;
    if(stF!=='all'&&r.status!==stF)return false;
    if(q&&!r.id.toLowerCase().includes(q)&&!r.name.toLowerCase().includes(q))return false;
    return true;
  });

  // Stats
  const open=risks.filter(r=>r.status==='Open').length;
  const mitigating=risks.filter(r=>r.status==='Mitigating').length;
  const critical=risks.filter(r=>r.lik*r.imp>=15).length;
  const avgScore=risks.length?Math.round(risks.reduce((s,r)=>s+r.lik*r.imp,0)/risks.length*10)/10:0;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-num" style="color:#e74c3c">${open}</div><div class="stat-label">Open Risks</div></div>
    <div class="stat"><div class="stat-num" style="color:#f39c12">${mitigating}</div><div class="stat-label">Mitigating</div></div>
    <div class="stat"><div class="stat-num" style="color:#ff1744">${critical}</div><div class="stat-label">Critical (15+)</div></div>
    <div class="stat"><div class="stat-num" style="color:#3498db">${avgScore}</div><div class="stat-label">Avg Risk Score</div></div>
  `;

  // Heat map
  const hm=document.getElementById('heatmap');
  const grid=Array.from({length:5},()=>Array(5).fill(0));
  risks.forEach(r=>{if(r.status!=='Closed')grid[5-r.lik][r.imp-1]++});
  let html='<div class="hm-corner">Lik↑</div>';
  for(let c=1;c<=5;c++)html+=`<div class="hm-header">${c}</div>`;
  for(let row=0;row<5;row++){
    html+=`<div class="hm-label">${5-row}</div>`;
    for(let col=0;col<5;col++){
      const count=grid[row][col];
      const lik=5-row,imp=col+1,score=lik*imp;
      const risksInCell=risks.filter(r=>r.lik===lik&&r.imp===imp&&r.status!=='Closed');
      const names=risksInCell.map(r=>r.id).join(', ');
      html+=`<div class="hm-cell" style="background:${hmColors[row][col]};color:${hmTextColors[row][col]}">${count||''}<div class="tooltip">${count?`Score ${score}: ${names}`:'No risks'}</div></div>`;
    }
  }
  hm.innerHTML=html;

  // Top risks
  const sorted=[...risks].filter(r=>r.status!=='Closed').sort((a,b)=>(b.lik*b.imp)-(a.lik*a.imp)).slice(0,5);
  const maxScore=sorted.length?sorted[0].lik*sorted[0].imp:1;
  document.getElementById('topRisks').innerHTML=sorted.map(r=>{
    const score=r.lik*r.imp;
    const pct=Math.round((score/25)*100);
    const color=score>=15?'#e74c3c':score>=10?'#e67e22':score>=6?'#f39c12':'#2ecc71';
    const trendIcon=r.trend==='up'?'↑':r.trend==='down'?'↓':'→';
    const trendClass=r.trend==='up'?'trend-up':r.trend==='down'?'trend-down':'trend-flat';
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="width:50px;font-weight:700;color:#999;font-size:12px">${r.id}</span>
      <div style="flex:1">
        <div style="font-size:13px;margin-bottom:4px">${r.name}</div>
        <div style="background:#2a2a2a;height:6px;border-radius:3px"><div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div></div>
      </div>
      <span style="font-weight:700;color:${color};min-width:30px;text-align:center">${score}</span>
      <span class="${trendClass}" style="font-size:16px;font-weight:700">${trendIcon}</span>
    </div>`;
  }).join('');

  // Table
  document.getElementById('riskTable').innerHTML=filtered.map((r,i)=>{
    const oi=risks.indexOf(r);
    const score=r.lik*r.imp;
    const color=score>=15?'#e74c3c':score>=10?'#e67e22':score>=6?'#f39c12':'#2ecc71';
    const stColor={Open:'#e74c3c',Mitigating:'#f39c12',Accepted:'#3498db',Closed:'#2ecc71'}[r.status];
    const trendIcon=r.trend==='up'?'↑':r.trend==='down'?'↓':'→';
    const trendClass=r.trend==='up'?'trend-up':r.trend==='down'?'trend-down':'trend-flat';
    return `<tr onclick="openEdit(${oi})" style="cursor:pointer">
      <td><strong>${r.id}</strong></td><td>${r.name}</td><td>${r.cat}</td>
      <td>${r.lik}</td><td>${r.imp}</td>
      <td><span style="color:${color};font-weight:700">${score}</span></td>
      <td><span class="badge" style="background:${stColor}22;color:${stColor}">${r.status}</span></td>
      <td>${r.owner}</td>
      <td><span class="${trendClass}" style="font-weight:700">${trendIcon}</span></td>
    </tr>`;
  }).join('');

  // Categories
  const cats=[...new Set(risks.map(r=>r.cat))];
  const catSel=document.getElementById('catFilter');
  const curCat=catSel.value;
  catSel.innerHTML='<option value="all">All Categories</option>'+cats.map(c=>`<option ${c===curCat?'selected':''}>${c}</option>`).join('');
}

function openAdd(){editIdx=-1;document.getElementById('modalTitle').textContent='Add Risk';document.getElementById('fId').value='R-'+(risks.length+1).toString().padStart(3,'0');document.getElementById('fName').value='';document.getElementById('fCat').value='Operational';document.getElementById('fLik').value='3';document.getElementById('fImp').value='3';document.getElementById('fStatus').value='Open';document.getElementById('fOwner').value='';document.getElementById('fMit').value='';document.getElementById('modal').classList.add('active')}
function openEdit(i){editIdx=i;const r=risks[i];document.getElementById('modalTitle').textContent='Edit Risk';document.getElementById('fId').value=r.id;document.getElementById('fName').value=r.name;document.getElementById('fCat').value=r.cat;document.getElementById('fLik').value=r.lik;document.getElementById('fImp').value=r.imp;document.getElementById('fStatus').value=r.status;document.getElementById('fOwner').value=r.owner;document.getElementById('fMit').value=r.mit||'';document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function saveRisk(){
  const r={id:document.getElementById('fId').value,name:document.getElementById('fName').value,cat:document.getElementById('fCat').value,lik:+document.getElementById('fLik').value,imp:+document.getElementById('fImp').value,status:document.getElementById('fStatus').value,owner:document.getElementById('fOwner').value,trend:'flat',mit:document.getElementById('fMit').value};
  if(editIdx>=0){r.trend=risks[editIdx].trend;risks[editIdx]=r}else risks.push(r);
  save();closeModal();render();
}
function exportCSV(){
  const h='ID,Risk,Category,Likelihood,Impact,Score,Status,Owner,Trend,Mitigation\n';
  const rows=risks.map(r=>`"${r.id}","${r.name}","${r.cat}",${r.lik},${r.imp},${r.lik*r.imp},"${r.status}","${r.owner}","${r.trend}","${(r.mit||'').replace(/"/g,'""')}"`).join('\n');
  const blob=new Blob([h+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='risk_register_export.csv';a.click();
}

document.querySelectorAll('#catFilter,#statusFilter').forEach(el=>el.addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);
render();
</script>
</body>
</html>
