<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRC Controls Tracker | GRC Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#141414;color:#e5e5e5;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:24px 32px;border-bottom:3px solid #e50914}
.header h1{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.header p{color:#999;font-size:14px;margin-top:4px}
.toolbar{display:flex;gap:12px;padding:20px 32px;background:#1a1a1a;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 14px;border-radius:6px;font-size:13px}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:#e50914}
.btn{background:#e50914;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s}
.btn:hover{background:#b2070f}
.btn-outline{background:transparent;border:1px solid #e50914;color:#e50914}
.btn-outline:hover{background:#e50914;color:#fff}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:20px 32px}
.stat-card{background:#1e1e1e;border-radius:10px;padding:20px;border-left:4px solid #e50914}
.stat-card.green{border-left-color:#2ecc71}
.stat-card.yellow{border-left-color:#f39c12}
.stat-card.red{border-left-color:#e74c3c}
.stat-card.blue{border-left-color:#3498db}
.stat-num{font-size:36px;font-weight:700;color:#fff}
.stat-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.main{padding:0 32px 32px}
.table-wrap{background:#1e1e1e;border-radius:10px;overflow:hidden;margin-top:16px}
table{width:100%;border-collapse:collapse}
th{background:#252525;padding:12px 16px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#888;position:sticky;top:0}
td{padding:12px 16px;border-bottom:1px solid #2a2a2a;font-size:13px}
tr:hover{background:#252525}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-pass{background:#1a3a2a;color:#2ecc71}
.badge-fail{background:#3a1a1a;color:#e74c3c}
.badge-partial{background:#3a2e1a;color:#f39c12}
.badge-na{background:#2a2a2a;color:#666}
.framework{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:1px;background:#2a2a2a;color:#bbb}
.progress-bar{width:100%;height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#1e1e1e;border-radius:12px;padding:28px;width:90%;max-width:600px;border:1px solid #333}
.modal h3{font-size:20px;margin-bottom:16px;color:#fff}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#2a2a2a;border:1px solid #444;color:#e5e5e5;padding:8px 12px;border-radius:6px;font-size:13px}
.form-group textarea{height:80px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.chart-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.chart-card{background:#1e1e1e;border-radius:10px;padding:20px}
.chart-card h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:80px;font-size:12px;color:#999;text-align:right;flex-shrink:0}
.bar{height:24px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;min-width:30px;transition:width .6s}
@media(max-width:768px){.chart-section{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<h1>GRC Controls Tracker</h1>
<p>Enterprise GRC — ISO 27001 / NIST 800-53 / SOX / PCI-DSS Control Mapping</p>
</div>

<div class="toolbar">
<select id="frameworkFilter">
<option value="all">All Frameworks</option>
<option value="ISO 27001">ISO 27001</option>
<option value="NIST 800-53">NIST 800-53</option>
<option value="SOX">SOX</option>
<option value="PCI-DSS">PCI-DSS</option>
<option value="GDPR">GDPR</option>
</select>
<select id="statusFilter">
<option value="all">All Statuses</option>
<option value="Implemented">Implemented</option>
<option value="Partial">Partial</option>
<option value="Not Implemented">Not Implemented</option>
<option value="N/A">N/A</option>
</select>
<select id="riskFilter">
<option value="all">All Risk Levels</option>
<option value="Critical">Critical</option>
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
<input type="text" id="searchBox" placeholder="Search controls..." style="width:220px">
<button class="btn" onclick="openAddModal()">+ Add Control</button>
<button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
</div>

<div class="stats" id="statsRow"></div>

<div class="chart-section" style="padding:0 32px">
<div class="chart-card">
<h3>Control Status by Framework</h3>
<div id="frameworkChart" class="bar-chart"></div>
</div>
<div class="chart-card">
<h3>Risk Distribution</h3>
<div id="riskChart" class="bar-chart"></div>
</div>
</div>

<div class="main">
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Control ID</th>
<th>Control Name</th>
<th>Frameworks</th>
<th>Risk Level</th>
<th>Status</th>
<th>Owner</th>
<th>Last Tested</th>
<th>Evidence</th>
</tr>
</thead>
<tbody id="controlsTable"></tbody>
</table>
</div>
</div>

<div class="modal-overlay" id="addModal">
<div class="modal">
<h3>Add / Edit Control</h3>
<div class="form-group"><label>Control ID</label><input id="fId" placeholder="e.g. AC-01"></div>
<div class="form-group"><label>Control Name</label><input id="fName" placeholder="e.g. Access Control Policy"></div>
<div class="form-group"><label>Frameworks (comma-separated)</label><input id="fFrameworks" placeholder="ISO 27001, NIST 800-53, SOX"></div>
<div class="form-group"><label>Risk Level</label>
<select id="fRisk"><option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option></select></div>
<div class="form-group"><label>Status</label>
<select id="fStatus"><option>Implemented</option><option>Partial</option><option>Not Implemented</option><option>N/A</option></select></div>
<div class="form-group"><label>Owner</label><input id="fOwner" placeholder="e.g. Security Engineering"></div>
<div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="Control description, evidence links, etc."></textarea></div>
<div class="modal-actions">
<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="saveControl()">Save Control</button>
</div>
</div>
</div>

<script>
const sampleControls = [
  {id:"AC-01",name:"Access Control Policy & Procedures",frameworks:["ISO 27001","NIST 800-53","SOX"],risk:"High",status:"Implemented",owner:"Security Engineering",lastTested:"2026-02-15",evidence:true,notes:""},
  {id:"AC-02",name:"Account Management",frameworks:["ISO 27001","NIST 800-53","PCI-DSS"],risk:"High",status:"Implemented",owner:"IAM Team",lastTested:"2026-03-01",evidence:true,notes:""},
  {id:"AC-03",name:"Access Enforcement",frameworks:["NIST 800-53","PCI-DSS","SOX"],risk:"Critical",status:"Implemented",owner:"Platform Engineering",lastTested:"2026-02-28",evidence:true,notes:""},
  {id:"AU-01",name:"Audit & Accountability Policy",frameworks:["ISO 27001","NIST 800-53","SOX","GDPR"],risk:"High",status:"Implemented",owner:"GRC Team",lastTested:"2026-01-20",evidence:true,notes:""},
  {id:"AU-06",name:"Audit Log Review & Reporting",frameworks:["NIST 800-53","SOX","PCI-DSS"],risk:"High",status:"Partial",owner:"SOC",lastTested:"2026-02-10",evidence:true,notes:"Automated review in progress"},
  {id:"CA-07",name:"Continuous Monitoring",frameworks:["NIST 800-53","ISO 27001"],risk:"Critical",status:"Partial",owner:"Detection Engineering",lastTested:"2026-03-05",evidence:true,notes:"Expanding endpoint coverage"},
  {id:"CM-06",name:"Configuration Settings",frameworks:["NIST 800-53","PCI-DSS","ISO 27001"],risk:"Medium",status:"Implemented",owner:"Platform Engineering",lastTested:"2026-02-20",evidence:true,notes:""},
  {id:"CP-02",name:"Business Continuity Plan",frameworks:["ISO 27001","NIST 800-53"],risk:"Critical",status:"Implemented",owner:"Business Continuity",lastTested:"2026-01-15",evidence:true,notes:"Annual DR test completed"},
  {id:"CP-04",name:"DR/BC Testing & Exercises",frameworks:["ISO 27001","NIST 800-53"],risk:"High",status:"Partial",owner:"Business Continuity",lastTested:"2026-01-15",evidence:true,notes:"Tabletop completed; full failover Q2"},
  {id:"IA-02",name:"Multi-Factor Authentication",frameworks:["NIST 800-53","PCI-DSS","SOX"],risk:"Critical",status:"Implemented",owner:"IAM Team",lastTested:"2026-03-10",evidence:true,notes:""},
  {id:"IR-01",name:"Incident Response Policy",frameworks:["ISO 27001","NIST 800-53","GDPR"],risk:"High",status:"Implemented",owner:"Security Operations",lastTested:"2026-02-25",evidence:true,notes:""},
  {id:"IR-04",name:"Incident Handling",frameworks:["NIST 800-53","ISO 27001"],risk:"High",status:"Implemented",owner:"Security Operations",lastTested:"2026-03-01",evidence:true,notes:""},
  {id:"PE-01",name:"Physical Access Authorization",frameworks:["ISO 27001","NIST 800-53","PCI-DSS"],risk:"Medium",status:"Implemented",owner:"Facilities",lastTested:"2026-01-30",evidence:true,notes:""},
  {id:"PL-02",name:"Acceptable Use Policy",frameworks:["ISO 27001","NIST 800-53"],risk:"Low",status:"Implemented",owner:"GRC Team",lastTested:"2026-01-10",evidence:true,notes:""},
  {id:"RA-03",name:"Risk Assessment",frameworks:["ISO 27001","NIST 800-53","SOX","GDPR"],risk:"Critical",status:"Partial",owner:"GRC Team",lastTested:"2026-02-01",evidence:true,notes:"Annual assessment in progress"},
  {id:"SA-04",name:"Vendor Risk Assessment",frameworks:["ISO 27001","NIST 800-53","GDPR"],risk:"High",status:"Implemented",owner:"Third-Party Risk",lastTested:"2026-02-18",evidence:true,notes:""},
  {id:"SC-07",name:"Boundary Protection",frameworks:["NIST 800-53","PCI-DSS"],risk:"Critical",status:"Implemented",owner:"Network Engineering",lastTested:"2026-03-08",evidence:true,notes:""},
  {id:"SC-28",name:"Data Encryption at Rest",frameworks:["NIST 800-53","PCI-DSS","GDPR"],risk:"Critical",status:"Implemented",owner:"Platform Engineering",lastTested:"2026-02-22",evidence:true,notes:""},
  {id:"SI-04",name:"System Monitoring",frameworks:["NIST 800-53","SOX","ISO 27001"],risk:"High",status:"Implemented",owner:"Detection Engineering",lastTested:"2026-03-12",evidence:true,notes:""},
  {id:"PM-09",name:"Risk Register Management",frameworks:["ISO 27001","NIST 800-53"],risk:"High",status:"Not Implemented",owner:"GRC Team",lastTested:"",evidence:false,notes:"Planned for Q2 implementation"},
];

let controls = JSON.parse(localStorage.getItem('grc_controls')) || sampleControls;
let editIndex = -1;

function save(){localStorage.setItem('grc_controls',JSON.stringify(controls))}

function render(){
  const fw = document.getElementById('frameworkFilter').value;
  const st = document.getElementById('statusFilter').value;
  const rk = document.getElementById('riskFilter').value;
  const q = document.getElementById('searchBox').value.toLowerCase();

  const filtered = controls.filter(c => {
    if(fw!=='all' && !c.frameworks.includes(fw)) return false;
    if(st!=='all' && c.status!==st) return false;
    if(rk!=='all' && c.risk!==rk) return false;
    if(q && !c.id.toLowerCase().includes(q) && !c.name.toLowerCase().includes(q)) return false;
    return true;
  });

  // Stats
  const total = controls.length;
  const impl = controls.filter(c=>c.status==='Implemented').length;
  const partial = controls.filter(c=>c.status==='Partial').length;
  const notImpl = controls.filter(c=>c.status==='Not Implemented').length;
  const pct = total ? Math.round((impl/total)*100) : 0;
  
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card blue"><div class="stat-num">${total}</div><div class="stat-label">Total Controls</div></div>
    <div class="stat-card green"><div class="stat-num">${impl}</div><div class="stat-label">Implemented</div></div>
    <div class="stat-card yellow"><div class="stat-num">${partial}</div><div class="stat-label">Partial</div></div>
    <div class="stat-card red"><div class="stat-num">${notImpl}</div><div class="stat-label">Not Implemented</div></div>
    <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Compliance Rate</div>
    <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%;background:${pct>80?'#2ecc71':pct>60?'#f39c12':'#e74c3c'}"></div></div></div>
  `;

  // Table
  const tbody = document.getElementById('controlsTable');
  tbody.innerHTML = filtered.map((c,i) => {
    const oi = controls.indexOf(c);
    const statusClass = c.status==='Implemented'?'badge-pass':c.status==='Partial'?'badge-partial':c.status==='Not Implemented'?'badge-fail':'badge-na';
    const riskColors = {Critical:'#e74c3c',High:'#e67e22',Medium:'#f39c12',Low:'#27ae60'};
    return `<tr onclick="openEdit(${oi})" style="cursor:pointer">
      <td><strong>${c.id}</strong></td>
      <td>${c.name}</td>
      <td>${c.frameworks.map(f=>`<span class="framework">${f}</span>`).join(' ')}</td>
      <td><span style="color:${riskColors[c.risk]};font-weight:600">${c.risk}</span></td>
      <td><span class="badge ${statusClass}">${c.status}</span></td>
      <td>${c.owner}</td>
      <td>${c.lastTested||'—'}</td>
      <td>${c.evidence?'<span style="color:#2ecc71">✓</span>':'<span style="color:#e74c3c">✗</span>'}</td>
    </tr>`;
  }).join('');

  // Charts
  renderCharts();
}

function renderCharts(){
  const fws = ['ISO 27001','NIST 800-53','SOX','PCI-DSS','GDPR'];
  const fwChart = document.getElementById('frameworkChart');
  fwChart.innerHTML = fws.map(fw => {
    const fwControls = controls.filter(c=>c.frameworks.includes(fw));
    const impl = fwControls.filter(c=>c.status==='Implemented').length;
    const total = fwControls.length;
    const pct = total ? Math.round((impl/total)*100) : 0;
    return `<div class="bar-row">
      <span class="bar-label">${fw.replace(' 800-53','').replace(' 27001','')}</span>
      <div style="flex:1;display:flex;align-items:center;gap:8px">
        <div class="bar" style="width:${Math.max(pct,8)}%;background:${pct>80?'#2ecc71':pct>60?'#f39c12':'#e74c3c'}">${pct}%</div>
        <span style="font-size:11px;color:#666">${impl}/${total}</span>
      </div>
    </div>`;
  }).join('');

  const risks = ['Critical','High','Medium','Low'];
  const riskColors = {Critical:'#e74c3c',High:'#e67e22',Medium:'#f39c12',Low:'#27ae60'};
  const maxR = Math.max(...risks.map(r=>controls.filter(c=>c.risk===r).length),1);
  document.getElementById('riskChart').innerHTML = risks.map(r => {
    const count = controls.filter(c=>c.risk===r).length;
    const pct = Math.round((count/maxR)*100);
    return `<div class="bar-row">
      <span class="bar-label">${r}</span>
      <div style="flex:1"><div class="bar" style="width:${Math.max(pct,8)}%;background:${riskColors[r]}">${count}</div></div>
    </div>`;
  }).join('');
}

function openAddModal(){editIndex=-1;document.getElementById('fId').value='';document.getElementById('fName').value='';document.getElementById('fFrameworks').value='';document.getElementById('fRisk').value='Medium';document.getElementById('fStatus').value='Implemented';document.getElementById('fOwner').value='';document.getElementById('fNotes').value='';document.getElementById('addModal').classList.add('active')}
function openEdit(i){editIndex=i;const c=controls[i];document.getElementById('fId').value=c.id;document.getElementById('fName').value=c.name;document.getElementById('fFrameworks').value=c.frameworks.join(', ');document.getElementById('fRisk').value=c.risk;document.getElementById('fStatus').value=c.status;document.getElementById('fOwner').value=c.owner;document.getElementById('fNotes').value=c.notes||'';document.getElementById('addModal').classList.add('active')}
function closeModal(){document.getElementById('addModal').classList.remove('active')}
function saveControl(){
  const c={id:document.getElementById('fId').value,name:document.getElementById('fName').value,frameworks:document.getElementById('fFrameworks').value.split(',').map(s=>s.trim()).filter(Boolean),risk:document.getElementById('fRisk').value,status:document.getElementById('fStatus').value,owner:document.getElementById('fOwner').value,lastTested:new Date().toISOString().split('T')[0],evidence:true,notes:document.getElementById('fNotes').value};
  if(editIndex>=0)controls[editIndex]=c;else controls.push(c);
  save();closeModal();render();
}
function exportCSV(){
  const header='Control ID,Control Name,Frameworks,Risk,Status,Owner,Last Tested,Evidence\n';
  const rows=controls.map(c=>`"${c.id}","${c.name}","${c.frameworks.join('; ')}","${c.risk}","${c.status}","${c.owner}","${c.lastTested}","${c.evidence?'Yes':'No'}"`).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='grc_controls_export.csv';a.click();
}

document.querySelectorAll('#frameworkFilter,#statusFilter,#riskFilter').forEach(el=>el.addEventListener('change',render));
document.getElementById('searchBox').addEventListener('input',render);
render();
</script>
</body>
</html>
